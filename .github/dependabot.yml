version: 2

updates:
  # Frontend Dependencies
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "deps(client)"

    labels:
      - "dependencies"
      - "frontend"
      - "security"

    groups:
      frontend-dependencies:
        patterns:
          - "*"

  # Backend Dependencies
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "daily"
      time: "06:15"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 10

    commit-message:
      prefix: "deps(server)"

    labels:
      - "dependencies"
      - "backend"
      - "security"

    groups:
      backend-dependencies:
        patterns:
          - "*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:30"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "ci"

    labels:
      - "dependencies"
      - "ci-cd"

    groups:
      github-actions:
        patterns:
          - "*"
